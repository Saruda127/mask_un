<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Analyzer (Every 3 Seconds)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --primary: #10b981; /* เปลี่ยนเป็นสีเขียวมรกตให้ดู Active */
            --primary-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: 1px solid #22314d;
            position: relative;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 0.25rem 0;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .btn-start {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-start:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }

        /* กล่องครอบ Webcam และตัวนับเวลา */
        .webcam-wrapper {
            position: relative;
            margin: 1.5rem auto;
            width: 320px;
            height: 320px;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #22314d;
            display: none; /* ซ่อนไว้ก่อนกด Start */
        }

        #webcam-container canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* แถบเวลานับถอยหลัง 3 วินาที */
        .countdown-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .countdown-bar {
            height: 100%;
            background-color: var(--accent);
            width: 100%;
            transition: width 3s linear; /* วิ่งนิ่ม ๆ ครบ 3 วินาที */
        }

        /* เอฟเฟกต์แฟลชตอนกดชัตเตอร์จับภาพ */
        .flash-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            opacity: 0;
            z-index: 20;
            pointer-events: none;
        }

        /* ไอคอนแจ้งเตือนตอนสแกนสำเร็จ */
        .scan-badge {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background-color: rgba(16, 185, 129, 0.9);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }

        /* ส่วนแสดงผลลัพธ์ */
        #label-container {
            margin-top: 1.5rem;
            text-align: left;
        }

        .prediction-row {
            background-color: #1e293b;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            border: 1px solid #334155;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ไฮไลท์แถวที่ชนะหรือมีเปอร์เซ็นต์สูงสุด */
        .prediction-row.highest {
            border-color: var(--primary);
            background-color: rgba(16, 185, 129, 0.1);
        }

        .label-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .class-percentage {
            color: var(--text-muted);
        }

        .prediction-row.highest .class-percentage {
            color: var(--primary);
        }

        .progress-bar-bg {
            background-color: #0f172a;
            border-radius: 9999px;
            height: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: #475569;
            height: 100%;
            width: 0%;
            border-radius: 9999px;
            transition: width 0.4s ease, background-color 0.4s ease;
        }

        .prediction-row.highest .progress-bar-fill {
            background-color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Teachable Machine Image Model</h1>
        <div class="subtitle">ระบบจะจับภาพและอัปเดตผลลัพธ์ทุก ๆ 3 วินาที</div>
        
        <button type="button" class="btn-start" onclick="init()">เปิดกล้องเริ่มต้นการทำงาน</button>
        
        <!-- ส่วนแสดงผลกล้องที่เพิ่มแถบลูกเล่นเข้าไป -->
        <div class="webcam-wrapper" id="webcam-wrapper">
            <div class="countdown-container">
                <div class="countdown-bar" id="countdown-bar"></div>
            </div>
            <div class="flash-effect" id="flash-effect"></div>
            <div class="scan-badge" id="scan-badge">📸 CAPTURED</div>
            <div id="webcam-container"></div>
        </div>
        
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/CT2LE_f9w/";

        let model, webcam, labelContainer, maxPredictions;
        let countdownBar, flashEffect, scanBadge;

        async function init() {
            document.querySelector('.btn-start').style.display = 'none';
            document.getElementById('webcam-wrapper').style.display = 'block';

            countdownBar = document.getElementById('countdown-bar');
            flashEffect = document.getElementById('flash-effect');
            scanBadge = document.getElementById('scan-badge');

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true;
            webcam = new tmImage.Webcam(320, 320, flip);
            await webcam.setup();
            await webcam.play();
            
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            
            for (let i = 0; i < maxPredictions; i++) {
                const row = document.createElement("div");
                row.className = "prediction-row";
                row.innerHTML = `
                    <div class="label-text">
                        <span class="class-name">กำลังรอภาพ...</span>
                        <span class="class-percentage">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill"></div>
                    </div>
                `;
                labelContainer.appendChild(row);
            }

            // เริ่มต้นระบบลูปเวลาแอนิเมชันและสแกนภาพ
            startVisualTimer();
        }

        async function loop() {
            webcam.update();
            window.requestAnimationFrame(loop);
        }

        // ฟังก์ชันควบคุมแถบเวลาวิ่งถอยหลัง และสั่ง Predict ทุก 3 วินาที
        function startVisualTimer() {
            // ทำนายผลครั้งแรกทันทีก่อนเริ่มจับเวลา
            predict();

            setInterval(async () => {
                // 1. เล่นเอฟเฟกต์ แฟลชหน้าจอหน้ากล้อง (ชัตเตอร์)
                flashEffect.style.opacity = '0.8';
                flashEffect.style.transition = 'none';
                
                scanBadge.style.opacity = '1';

                // คืนค่าแฟลชและป้ายแจ้งเตือนให้หายไปเบาๆ
                setTimeout(() => {
                    flashEffect.style.transition = 'opacity 0.4s ease';
                    flashEffect.style.opacity = '0';
                }, 50);

                setTimeout(() => {
                    scanBadge.style.opacity = '0';
                }, 800);

                // 2. รีเซ็ตหลอดจับเวลาด้านบนให้กลับไปเต็มเพื่อเริ่มวิ่งใหม่
                countdownBar.style.transition = 'none';
                countdownBar.style.width = '100%';
                
                // สั่งให้หลอดวิ่งลดลงภายใน 3 วินาที
                setTimeout(() => {
                    countdownBar.style.transition = 'width 3s linear';
                    countdownBar.style.width = '0%';
                }, 10);

                // 3. ทำการประมวลผลทำนายภาพ
                await predict();

            }, 3000);

            // สั่งให้หลอดจับเวลาวิ่งครั้งแรกสุด
            countdownBar.style.transition = 'width 3s linear';
            countdownBar.style.width = '0%';
        }

        // ฟังก์ชันทำนายผลลัพธ์
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            // หาค่า Index ของคลาสที่ได้คะแนนสูงสุดในรอบนั้น ๆ
            let highestIndex = 0;
            let maxProb = 0;
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > maxProb) {
                    maxProb = prediction[i].probability;
                    highestIndex = i;
                }
            }

            // อัปเดตข้อมูล UI ที่จะถูกฟรีซค้างไว้ 3 วินาที
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const percentage = (probability * 100).toFixed(0) + "%";

                const row = labelContainer.childNodes[i];
                row.querySelector('.class-name').innerText = className;
                row.querySelector('.class-percentage').innerText = percentage;
                row.querySelector('.progress-bar-fill').style.width = percentage;

                // เพิ่ม/ลบ คลาสไฮไลท์สีเขียวสำหรับตัวที่เปอร์เซ็นต์เยอะที่สุด
                if (i === highestIndex && probability > 0.1) {
                    row.classList.add('highest');
                } else {
                    row.classList.remove('highest');
                }
            }
        }
    </script>
</body>
</html>
