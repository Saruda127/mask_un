<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Snapshot Analyzer v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #090d16;
            --panel: #111827;
            --border: #1f2937;
            --primary: #10b981;
            --text: #f9fafb;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-card {
            background-color: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 0.25rem 0;
        }

        .desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .btn-action {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .btn-action:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        #error-box {
            background-color: #7f1d1d;
            border: 1px solid #b91c1c;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 14px;
            margin-top: 1rem;
            font-size: 0.85rem;
            display: none;
            text-align: left;
        }

        .viewport-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 1.5rem auto;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--border);
            background-color: #000;
            display: none;
        }

        /* ใช้กล้องจากแท็ก Video มาตรฐาน ไม่ผ่านระบบดัดแปลงของไลบรารี */
        #webcam-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Canvas ซ่อนในระบบสำหรับดึงเฉพาะเฟรมภาพไปส่งให้ AI */
        #capture-canvas {
            display: none;
        }

        .shutter-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        .status-overlay {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.75);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f59e0b;
            white-space: nowrap;
        }

        .status-overlay.analyzing {
            color: var(--primary);
        }

        #result-box {
            margin-top: 1.5rem;
            text-align: left;
        }

        .output-card {
            background-color: #1f2937;
            border: 1px solid #374151;
            padding: 0.85rem 1rem;
            border-radius: 14px;
            margin-bottom: 0.75rem;
            transition: all 0.25s ease;
        }

        .output-card.active {
            border-color: var(--primary);
            background-color: rgba(16, 185, 129, 0.08);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .pct-val { color: var(--text-muted); }
        .active .pct-val { color: var(--primary); }

        .bar-container {
            background-color: #111827;
            border-radius: 99px;
            height: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background-color: #4b5563;
            border-radius: 99px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active .bar-fill {
            background-color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="app-card">
        <h1>AI Snapshot Analyzer</h1>
        <div class="desc">วิเคราะห์ภาพจากกล้องสลับหยุดนิ่งทุก ๆ 3 วินาที</div>
        
        <button type="button" class="btn-action" id="start-btn" onclick="startApp()">เปิดกล้องและเริ่มทำงาน</button>
        <div id="error-box"></div>

        <div class="viewport-wrapper" id="view-zone">
            <video id="webcam-video" autoplay playsinline muted></video>
            <canvas id="capture-canvas" width="320" height="320"></canvas>
            <div class="shutter-flash" id="flash"></div>
            <div class="status-overlay" id="status-text">กำลังโหลด...</div>
        </div>

        <div id="result-box"></div>
    </div>

    <!-- โหลดเฉพาะคอมโพเนนต์ที่จำเป็นของ Tensorflow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        // ลิงก์โมเดล Teachable Machine
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/CT2LE_f9w/";
        
        let model, maxClasses;
        let video, canvas, ctx, flash, statusText, startBtn, errorBox;
        let countdown = 3;

        async function startApp() {
            startBtn = document.getElementById('start-btn');
            errorBox = document.getElementById('error-box');
            video = document.getElementById('webcam-video');
            canvas = document.getElementById('capture-canvas');
            ctx = canvas.getContext('2d');
            flash = document.getElementById('flash');
            statusText = document.getElementById('status-text');
            
            errorBox.style.display = 'none';
            startBtn.innerText = "กำลังดาวน์โหลด AI โมเดล...";
            startBtn.disabled = true;

            try {
                // 1. โหลดโมเดล AI
                model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
                maxClasses = model.getTotalClasses();

                // 2. เปิดกล้องด้วยคำสั่งมาตรฐานเสถียรสูง รองรับทุกเบราว์เซอร์
                startBtn.innerText = "กำลังเรียกเปิดกล้อง...";
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 640 }, 
                        height: { ideal: 640 },
                        facingMode: "user" 
                    }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                
                // รอสัญญาณภาพจากกล้องมาถึงจริง ๆ
                video.onloadeddata = () => {
                    // ปรับหน้าจอเปลี่ยนจากปุ่มกดมาเป็นหน้าต่างกล้อง
                    startBtn.style.display = 'none';
                    document.getElementById('view-zone').style.display = 'block';
                    
                    createUIResultCards();
                    runEngine(); // เริ่มต้นนับเวลาถ่ายภาพ
                };

            } catch (err) {
                console.error("Error details:", err);
                startBtn.innerText = "เปิดกล้องและเริ่มทำงาน";
                startBtn.disabled = false;
                errorBox.style.display = 'block';
                errorBox.innerHTML = `
                    <strong>ไม่สามารถเปิดกล้องได้เนื่องจาก:</strong><br>
                    1. คุณอาจปฏิเสธการเข้าถึงสิทธิ์กล้อง (กรุณากดอนุญาตสิทธิ์เว็บแคม)<br>
                    2. หากเปิดไฟล์ .html ตรง ๆ ในเครื่อง ให้ลองเปิดรันผ่าน <b>Live Server</b> ในโปรแกรม VS Code ครับ
                `;
            }
        }

        // สร้างการ์ดแสดงผลลัพธ์คลาส AI
        function createUIResultCards() {
            const resultBox = document.getElementById('result-box');
            resultBox.innerHTML = ""; // ล้างค่าเก่า
            for (let i = 0; i < maxClasses; i++) {
                const div = document.createElement('div');
                div.className = 'output-card';
                div.innerHTML = `
                    <div class="info-row">
                        <span class="class-title">รอสแกน...</span>
                        <span class="pct-val">0%</span>
                    </div>
                    <div class="bar-container"><div class="bar-fill"></div></div>
                `;
                resultBox.appendChild(div);
            }
        }

        // กลไกหลักคอยจับเวลา 3 วินาที
        function runEngine() {
            // ทำการตรวจจับครั้งแรกทันที
            processImageAnalysis();

            setInterval(async () => {
                countdown--;

                if (countdown > 0) {
                    // สตรีมวิดีโอทำงานปกติ
                    video.play(); 
                    statusText.className = "status-overlay";
                    statusText.innerText = `📸 จับภาพใน ${countdown} วินาที`;
                } 
                else if (countdown === 0) {
                    // วินาทีที่ 0: สั่ง Freeze หยุดวิดีโอไว้กับที่ + ยิงแฟลช
                    video.pause();
                    statusText.className = "status-overlay analyzing";
                    statusText.innerText = "⚡ กำลังวิเคราะห์ภาพ...";

                    // เล่นเอฟเฟกต์แฟลชกล้อง
                    flash.style.transition = 'none';
                    flash.style.opacity = '1';
                    setTimeout(() => {
                        flash.style.transition = 'opacity 0.4s ease';
                        flash.style.opacity = '0';
                    }, 50);

                    // วาดภาพนิ่ง ณ วินาทีนั้นเข้า Canvas และส่งให้ AI ตรวจสอบ
                    await processImageAnalysis();
                } 
                else {
                    // ปล่อยให้ภาพค้างไว้แสดงผลต่างจนสิ้นสุดช่วงเวลา แล้วกลับไปเริ่มนับใหม่
                    countdown = 3;
                    video.play();
                    statusText.className = "status-overlay";
                    statusText.innerText = `📸 จับภาพใน ${countdown} วินาที`;
                }
            }, 1000);
        }

        // วาดรูปส่งหาโมเดล AI และอัปเดตสถานะหลอดพลัง
        async function processImageAnalysis() {
            // ดึงเฟรมภาพปัจจุบันของกล้องมาวาดลงบน Canvas ลับ
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // ส่งภาพบน Canvas ไปวิเคราะห์กับ Teachable Machine
            const predictions = await model.predict(canvas);
            
            // ค้นหาตัวเลือกที่มีค่าสูงที่สุด
            let topIndex = 0;
            let topValue = 0;
            for (let i = 0; i < maxClasses; i++) {
                if (predictions[i].probability > topValue) {
                    topValue = predictions[i].probability;
                    topIndex = i;
                }
            }

            // แสดงค่าเปอร์เซ็นต์บนหน้าจอแบบนิ่งไว้ค้าง 3 วินาที
            const resultBox = document.getElementById('result-box');
            for (let i = 0; i < maxClasses; i++) {
                const name = predictions[i].className;
                const prob = predictions[i].probability;
                const pct = (prob * 100).toFixed(0) + "%";
                
                const card = resultBox.childNodes[i];
                if(card) {
                    card.querySelector('.class-title').innerText = name;
                    card.querySelector('.pct-val').innerText = pct;
                    card.querySelector('.bar-fill').style.width = pct;

                    if (i === topIndex && prob > 0.15) {
                        card.classList.add('active');
                    } else {
                        card.classList.remove('active');
                    }
                }
            }
        }
    </script>
</body>
</html>
