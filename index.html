<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Snapshot Analyzer (Every 3s)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #090d16;
            --panel: #111827;
            --border: #1f2937;
            --primary: #10b981;
            --text: #f9fafb;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-card {
            background-color: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 0.25rem 0;
        }

        .desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .btn-action {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .btn-action:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        #error-box {
            background-color: #7f1d1d;
            border: 1px solid #b91c1c;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 14px;
            margin-top: 1rem;
            font-size: 0.85rem;
            display: none;
            text-align: left;
        }

        /* โซนการแสดงผลภาพ */
        .viewport-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 1.5rem auto;
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid var(--border);
            background-color: #000;
            display: none;
        }

        /* ซ่อน Video ตัวจริงไว้ในระบบดึงภาพ */
        #hidden-video {
            display: none;
        }

        /* ใช้ Canvas ในการ Render ภาพนิ่งที่หยุดเป็นวิ ๆ แทน */
        #display-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror Effect */
        }

        /* เอฟเฟกต์การกะพริบตา/แฟลชตอนกดถ่าย */
        .shutter-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* ตัวบอกสถานะนับถอยหลัง */
        .status-overlay {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.75);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f59e0b;
        }

        .status-overlay.analyzing {
            color: var(--primary);
        }

        /* ส่วนแสดงผลกราฟ AI */
        #result-box {
            margin-top: 1.5rem;
            text-align: left;
        }

        .output-card {
            background-color: #1f2937;
            border: 1px solid #374151;
            padding: 0.85rem 1rem;
            border-radius: 14px;
            margin-bottom: 0.75rem;
            transition: all 0.25s ease;
        }

        .output-card.active {
            border-color: var(--primary);
            background-color: rgba(16, 185, 129, 0.08);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .pct-val { color: var(--text-muted); }
        .active .pct-val { color: var(--primary); }

        .bar-container {
            background-color: #111827;
            border-radius: 99px;
            height: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background-color: #4b5563;
            border-radius: 99px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .active .bar-fill {
            background-color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="app-card">
        <h1>AI Snapshot Analyzer</h1>
        <div class="desc">ถ่ายภาพและล็อกวิเคราะห์ทุก ๆ 3 วินาที (เห็นผลต่างชัดเจน)</div>
        
        <button type="button" class="btn-action" id="start-btn" onclick="setupApplication()">เริ่มต้นใช้งานระบบ</button>
        <div id="error-box"></div>

        <div class="viewport-wrapper" id="view-zone">
            <video id="hidden-video" autoplay playsinline></video>
            <canvas id="display-canvas"></canvas>
            <div class="shutter-flash" id="flash"></div>
            <div class="status-overlay" id="status-text">กำลังเตรียมระบบ...</div>
        </div>

        <div id="result-box"></div>
    </div>

    <!-- ลิงก์ไลบรารีของ Google Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/CT2LE_f9w/";
        
        let model, maxClasses;
        let video, canvas, ctx, flash, statusText, startBtn, errorBox;
        let isRunning = false;
        let secondsLeft = 3;

        async function setupApplication() {
            startBtn = document.getElementById('start-btn');
            errorBox = document.getElementById('error-box');
            video = document.getElementById('hidden-video');
            canvas = document.getElementById('display-canvas');
            ctx = canvas.getContext('2d');
            flash = document.getElementById('flash');
            statusText = document.getElementById('status-text');
            
            errorBox.style.display = 'none';
            startBtn.innerText = "กำลังดาวน์โหลด AI โมเดล...";
            startBtn.disabled = true;

            try {
                // 1. โหลดโมเดล
                model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
                maxClasses = model.getTotalClasses();

                // 2. ขอสิทธิ์เปิดกล้อง (Standard Web API)
                startBtn.innerText = "กำลังร้องขอเข้าถึงกล้อง...";
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 640, facingMode: "user" }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                
                // รอจนกว่ากล้องจะส่ง Metadata ภาพมา
                video.onloadedmetadata = () => {
                    canvas.width = 320;
                    canvas.height = 320;
                    
                    // ปรับ UI
                    startBtn.style.display = 'none';
                    document.getElementById('view-zone').style.display = 'block';
                    
                    isRunning = true;
                    renderLiveVideo(); // เริ่มสตรีมภาพสดลง canvas
                    initSnapshotEngine(); // เริ่มระบบกลไกหน่วงเวลา 3 วินาที
                };

                // สร้าง Elements สำหรับแสดงผลลัพธ์
                const resultBox = document.getElementById('result-box');
                for (let i = 0; i < maxClasses; i++) {
                    const div = document.createElement('div');
                    div.className = 'output-card';
                    div.innerHTML = `
                        <div class="info-row">
                            <span class="class-title">กำลังรอคอยภาพ...</span>
                            <span class="pct-val">0%</span>
                        </div>
                        <div class="bar-container"><div class="bar-fill"></div></div>
                    `;
                    resultBox.appendChild(div);
                }

            } catch (err) {
                console.error(err);
                startBtn.innerText = "เริ่มต้นใช้งานระบบ";
                startBtn.disabled = false;
                errorBox.style.display = 'block';
                errorBox.innerHTML = `
                    <strong>ไม่สามารถเริ่มระบบได้เนื่องจาก:</strong><br>
                    - บราวเซอร์ปฏิเสธการเข้าถึงกล้อง (กรุณากดอนุญาตสิทธิ์เว็บแคม)<br>
                    - หากเปิดไฟล์ HTML ตรงๆ ให้ลองเปิดผ่าน Local Server เช่น <b>Live Server</b> ใน VS Code ครับ
                `;
            }
        }

        // วาดภาพจากสตรีมกล้องลงสู่ Canvas แบบต่อเนื่อง
        function renderLiveVideo() {
            if (!isRunning) return;
            
            // วาดเฉพาะตอนที่ระบบไม่ได้สั่ง "Freeze/หยุดนิ่งเพื่อวิเคราะห์ภาพ"
            if (secondsLeft > 0) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            
            requestAnimationFrame(renderLiveVideo);
        }

        // กลไกหลัก: ควบคุมเวลาการหน่วงถ่ายภาพทุกๆ 3 วินาทีแบบหยุดนิ่ง
        function initSnapshotEngine() {
            // ฟังก์ชัน Loop นับถอยหลังในใจ 1 วินาทีเรื่อยๆ
            setInterval(async () => {
                if (!isRunning) return;

                secondsLeft--;

                if (secondsLeft > 0) {
                    // สถานะสตรีมกล้องปกติ กำลังนับถอยหลัง
                    statusText.className = "status-overlay";
                    statusText.innerText = `📸 จับภาพใน ${secondsLeft} วินาที`;
                } else if (secondsLeft === 0) {
                    // วินาทีที่ 0: ทำการ Freeze ล็อกภาพหน้าจอทันที + ยิงแฟลชชัตเตอร์
                    statusText.className = "status-overlay analyzing";
                    statusText.innerText = "⚡ กำลังประมวลผล...";

                    // เล่นเอฟเฟกต์แฟลชกล้อง
                    flash.style.opacity = '1';
                    setTimeout(() => {
                        flash.style.transition = 'opacity 0.5s ease';
                        flash.style.opacity = '0';
                    }, 50);
                    // รีเซ็ตคุณสมบัติอนิเมชันแฟลช
                    flash.style.transition = 'none'; 

                    // นำภาพนิ่งล่าสุดบนแคนวาสขณะนั้น ส่งเข้า AI ทำนายผล
                    await runAIAnalysis();
                } else {
                    // วินาทีติดลบ (ช่วงแสดงภาพค้างไว้ให้ดูผลต่าง) ครบ 3 วินาทีแล้ว สั่งเริ่มรอบใหม่
                    secondsLeft = 3;
                    statusText.className = "status-overlay";
                    statusText.innerText = `📸 จับภาพใน ${secondsLeft} วินาที`;
                }
            }, 1000);
        }

        // ส่งรูปภาพนิ่งไปคำนวณที่ตัวโมเดล Teachable Machine
        async function runAIAnalysis() {
            const predictions = await model.predict(canvas);
            
            // ค้นหาดัชนีที่มีความน่าจะเป็นสูงสุด
            let topIndex = 0;
            let topValue = 0;
            for (let i = 0; i < maxClasses; i++) {
                if (predictions[i].probability > topValue) {
                    topValue = predictions[i].probability;
                    topIndex = i;
                }
            }

            // แสดงค่าเปอร์เซ็นต์บนหน้าจอแบบคงค้างไว้ 3 วินาที
            const resultBox = document.getElementById('result-box');
            for (let i = 0; i < maxClasses; i++) {
                const name = predictions[i].className;
                const prob = predictions[i].probability;
                const pct = (prob * 100).toFixed(0) + "%";
                
                const card = resultBox.childNodes[i];
                card.querySelector('.class-title').innerText = name;
                card.querySelector('.pct-val').innerText = pct;
                card.querySelector('.bar-fill').style.width = pct;

                if (i === topIndex && prob > 0.15) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            }
        }
    </script>
</body>
</html>
