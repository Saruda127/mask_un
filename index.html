<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
            text-align: center;
            width: 100%;
            max-width: 450px;
            border: 1px solid #334155;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .btn-start {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgb(59 130 246 / 0.3);
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        #webcam-container {
            margin: 1.5rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam-container canvas {
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid #334155;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2);
            transform: scaleX(-1); /* Flip webcam ให้เหมือนกระจกเงา */
        }

        #label-container {
            margin-top: 1.5rem;
            text-align: left;
        }

        .prediction-row {
            margin-bottom: 1rem;
        }

        .label-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .progress-bar-bg {
            background-color: #334155;
            border-radius: 9999px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            height: 100%;
            width: 0%;
            border-radius: 9999px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Teachable Machine Image Model</h1>
        <div class="subtitle">ระบบวิเคราะห์รูปภาพด้วย AI (อัปเดตทุก 3 วินาที)</div>
        
        <button type="button" class="btn-start" onclick="init()">เปิดกล้องและเริ่มทำงาน</button>
        
        <div id="webcam-container"></div>
        <div id="label-container"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ลิงก์โมเดลของคุณจาก Teachable Machine[cite: 1]
        const URL = "https://teachablemachine.withgoogle.com/models/CT2LE_f9w/";

        let model, webcam, labelContainer, maxPredictions;
        let predictInterval;

        // ฟังก์ชันเริ่มต้นระบบเมื่อคลิกปุ่ม[cite: 1]
        async function init() {
            // ซ่อนปุ่มหลังจากกดเพื่อความสวยงามและป้องกันการกดซ้ำ
            document.querySelector('.btn-start').style.display = 'none';

            const modelURL = URL + "model.json";[cite: 1]
            const metadataURL = URL + "metadata.json";[cite: 1]

            // โหลดโมเดล[cite: 1]
            model = await tmImage.load(modelURL, metadataURL);[cite: 1]
            maxPredictions = model.getTotalClasses();[cite: 1]

            // ตั้งค่ากล้อง Webcam[cite: 1]
            const flip = true; // พลิกรูปภาพให้เหมือนกระจก[cite: 1]
            webcam = new tmImage.Webcam(320, 320, flip); // ปรับขนาดหน้าจอแสดงผลให้ใหญ่ขึ้นเล็กน้อย (320x320)
            await webcam.setup();[cite: 1]
            await webcam.play();[cite: 1]
            
            // เริ่มต้นการลูปเพื่อดึงเฟรมภาพจากเว็บแคมมาแสดงผลอย่างราบรื่น (Smooth Video Feed)
            window.requestAnimationFrame(loop);

            // แสดงหน้าจอเว็บแคมใน DOM[cite: 1]
            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 1]
            labelContainer = document.getElementById("label-container");[cite: 1]
            
            // สร้างโครงสร้าง Progress Bar สำหรับแต่ละคลาส[cite: 1]
            for (let i = 0; i < maxPredictions; i++) {[cite: 1]
                const row = document.createElement("div");
                row.className = "prediction-row";
                row.innerHTML = `
                    <div class="label-text">
                        <span class="class-name">-</span>
                        <span class="class-percentage">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill"></div>
                    </div>
                `;
                labelContainer.appendChild(row);[cite: 1]
            }

            // ตั้งเวลาให้ทำการ Predict ทุกๆ 3 วินาที (3000ms)ตามต้องการ
            predictInterval = setInterval(async () => {
                await predict();
            }, 3000);
        }

        // ลูปดึงเฟรมจากเว็บแคมเพื่อให้ภาพเคลื่อนไหวไม่กระตุก (ดึงเฉพาะภาพ แต่ไม่ได้สั่ง predict ในนี้)
        async function loop() {
            webcam.update();[cite: 1]
            window.requestAnimationFrame(loop);[cite: 1]
        }

        // ฟังก์ชันทำนายผลลัพธ์จากภาพ (ทำงานทุก 3 วินาที)
        async function predict() {
            const prediction = await model.predict(webcam.canvas);[cite: 1]
            
            for (let i = 0; i < maxPredictions; i++) {[cite: 1]
                const className = prediction[i].className;[cite: 1]
                const probability = prediction[i].probability; // ค่าระหว่าง 0.0 - 1.0
                const percentage = (probability * 100).toFixed(0) + "%"; // แปลงเป็นเปอร์เซ็นต์เต็ม เช่น 85%

                // เข้าถึง Element ในแต่ละแถวเพื่ออัปเดตข้อมูล
                const row = labelContainer.childNodes[i];
                row.querySelector('.class-name').innerText = className;
                row.querySelector('.class-percentage').innerText = percentage;
                row.querySelector('.progress-bar-fill').style.width = percentage;
            }
        }
    </script>
</body>
</html>
